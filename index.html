<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Quill UI 3</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <link rel="icon" href="Quill.png">
        <link rel="manifest" href="/0.1:dev4/manifest.json">
        <!--<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">--> <!-- Should give the page access to the area around the dynamic island, but broken as of iOS 26.3. -->
        <script>
            window.addEventListener("load", () => navigator.serviceWorker?.register("/UpdateHandler.js"));
        </script>
        <script src="/0.1:dev4/antica/Anim.js"></script>
        <script src="/0.1:dev4/antica/Controls.js"></script>
        <script src="/0.1:dev4/antica/DOMUtils.js"></script>
        <!--<script src="/0.1:dev4/antica/Scrollbars.js"></script>-->
        <script src="/0.1:dev4/antica/Time.js"></script>
        <script src="/0.1:dev4/antica/Translations.js"></script>
    </head>
    <body style="background: url('/0.1:dev4/Wallpaper.jpg'), #333;">
        <style id="defined-style"></style>
        <div id="popups"></div>
        <script src="/0.1:dev4/UI3.js"></script>
        <script>
            let floatButton = simpleButton("Float");
            let fixButton = simpleButton("Fix");

            let popup = new Menu()
                /*.add({
                    element: $new("div").style({
                        width: "2000px",
                        height: "4000px",
                        background: "#FFF",
                        margin: "-100px",
                    }),
                })*/
                .add(new Title("States"))
                .add(floatButton)
                .add(fixButton)
                .add(new Title("Buttons"))
                .add(simpleButton("First button"))
                .add(simpleButton("Second button"))
                .add(simpleButton("Third button"))
                .add(new VerticalSpacer())
                .add(simpleButton("Fourth button"))
                .add(simpleButton("Fifth button"))
                .add(new VerticalSpacer())
                .add(new HorizontalGroup()
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                    .add(simpleButton("Test"))
                )
                .add(new VerticalSpacer())
                .add(new HorizontalGroup()
                    // .add(new MultiSelect()
                        .add(simpleButton("Top"))
                        .add(simpleButton("Middle"))
                        .add(simpleButton("Bottom"))
                    // )
                )
                .add(new VerticalSpacer())
                // .add(new MultiSelect()
                    .add(simpleButton("Top"))
                    .add(simpleButton("Middle"))
                    .add(simpleButton("Bottom"))
                // )
                .add(new VerticalSpacer())
                .add(toggleSwitch(undefined, "Toggle", undefined, false))
                .add(toggleSwitch(undefined, "Toggle switch", "Toggles stuff", false))
                .add(toggleSwitch(undefined, "Maybe", "width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover", false))
                .add(new VerticalSpacer())
                .add(new Title("Tests"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))
                .add(simpleButton("Test"))

            let float = () => {
                popup.state = "floating";
                popup.floatingLeft = 1200;
                popup.floatingTop = 400;
            };
            floatButton.onPrimary(float);

            let fix = () => {
                popup.state = "fixed";
                popup.fixedLeftAnchor = "right";
                popup.fixedLeft = -300;
                popup.fixedRightAnchor = "full-right";
                popup.fixedRight = 0;
                popup.fixedTopAnchor = "full-top";
                popup.fixedTop = 0;
                popup.fixedBottomAnchor = "full-bottom";
                popup.fixedBottom = 0;
            };
            fixButton.onPrimary(fix);

            float();
        </script>
    </body>
</html>
