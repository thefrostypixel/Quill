<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ASCII Table</title>
        <style>
            body {
                background-color: #121212;
                color: #ffffff;
                font-family: Arial, sans-serif;
                text-align: center;
                padding: 20px;
            }
            table {
                width: auto;
                margin: auto;
                border-collapse: collapse;
                background-color: #1e1e1e;
            }
            th, td {
                border: 1px solid #444;
                padding: 8px;
                text-align: left;
            }
            th {
                background-color: #333;
            }
        </style>
    </head>
    <body>
        <input type="text" id="url-input" value="https://ocw.mit.edu/ans7870/6/6.006/s08/lecturenotes/files/t8.shakespeare.txt" placeholder="Enter URLs separated by spaces" style="width: 500px; padding: 5px;">
        <button onclick="fetchAndProcess()" style="padding: 5px;">Fetch</button>
        <table>
            <thead>
                <tr>
                    <th>Character</th>
                    <th>ASCII (Hex)</th>
                    <th>ASCII (Dec)</th>
                    <th>Occurrences</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <script>
            async function fetchAndProcess() {
                const urls = document.getElementById("url-input").value.split(" ").filter(url => url.trim() !== "");
                if (urls.length === 0) return alert("Please enter at least one URL");

                const frequency = Array(128).fill(0);

                for (const url of urls) {
                    try {
                        const response = await fetch(url);
                        const text = await response.text();
                        countCharacters(text, frequency);
                    } catch (error) {
                        console.error("Error fetching URL:", url, error);
                    }
                }

                generateTable(frequency);
            }

            function countCharacters(text, frequency) {
                for (const char of text) {
                    const code = char.charCodeAt(0);
                    if (code >= 0x20 && code <= 0x7E) {
                        frequency[code]++;
                    }
                }
            }

            function generateTable(frequency) {
                const data = [];
                for (let i = 0x20; i <= 0x7E; i++) {
                    data.push({
                        Char: i,
                        Occurrences: frequency[i]
                    });
                }
                data.sort((a, b) => b.Occurrences - a.Occurrences);
                populateTable(data);
            }

            function populateTable(data) {
                const tableBody = document.getElementById("table-body");
                tableBody.innerHTML = "";
                data.forEach(entry => {
                    const char = String.fromCharCode(entry.Char);
                    const hex = entry.Char.toString(16).toUpperCase().padStart(2, '0');
                    const decimal = entry.Char;
                    const occurrences = entry.Occurrences;

                    const row = `<tr>
                    <td>${char === ' ' ? '[space]' : char}</td>
                    <td>0x${hex}</td>
                    <td>${decimal}</td>
                    <td>${occurrences}</td>
                </tr>`;
                    tableBody.innerHTML += row;
                });
            }
        </script>
    </body>
</html>
