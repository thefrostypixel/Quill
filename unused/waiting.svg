<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="16" height="16" fill="black"/>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(0 8 8)">
        <animate attributeName="cx" begin="-6s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(30 8 8)">
        <animate attributeName="cx" begin="-5.5s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(60 8 8)">
        <animate attributeName="cx" begin="-5s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(90 8 8)">
        <animate attributeName="cx" begin="-4.5s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(120 8 8)">
        <animate attributeName="cx" begin="-4s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="1" fill="white" transform="rotate(150 8 8)">
        <animate attributeName="cx" begin="-3.5s" dur="6s" values="2;8;14;8;2" calcMode="spline" keySplines="0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8;0.8 0.2 0.8 0.2;0.2 0.8 0.2 0.8" repeatCount="indefinite"/>
    </circle>
</svg>
